
<div class="container">
  <h2>Add Resource</h2>

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="name">Resource Name</label>
      <input id="name" type="text" class="form-control" formControlName="name" placeholder="Enter resource name" />
      <div class="text-danger" *ngIf="itemForm.get('name')?.touched && itemForm.get('name')?.invalid">
        Name is required.
      </div>
    </div>

    <div class="form-group">
      <label for="type">Resource Type</label>
      <input id="type" type="text" class="form-control" formControlName="type" placeholder="Enter resource type" />
      <div class="text-danger" *ngIf="itemForm.get('type')?.touched && itemForm.get('type')?.invalid">
        Type is required.
      </div>
    </div>

    <div class="form-group">
      <label for="availability">Available</label>
      <input id="availability" type="checkbox" formControlName="availability" />
    </div>

    <button type="submit" class="btn btn-primary">Add Resource</button>
  </form>

  <div class="alert alert-success mt-3" *ngIf="showMessage">
    {{ responseMessage }}
  </div>
  <div class="alert alert-danger mt-3" *ngIf="showError">
    {{ errorMessage }}
  </div>

  <hr />

  <h3>Resources</h3>
  <ul class="list-group">
    <li class="list-group-item" *ngFor="let r of resourceList">
      <strong>{{ r.name }}</strong> — {{ r.type }} —
      <span [class.text-success]="r.availability" [class.text-danger]="!r.availability">
        {{ r.availability ? 'Available' : 'Unavailable' }}
      </span>
    </li>
  </ul>
</div>
