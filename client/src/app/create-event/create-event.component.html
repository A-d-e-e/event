
<div class="container">
  <h2>Create Event</h2>

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" class="form-control" formControlName="title" />
      <div class="text-danger" *ngIf="itemForm.get('title')?.touched && itemForm.get('title')?.invalid">Title is required.</div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" rows="3" class="form-control" formControlName="description"></textarea>
      <div class="text-danger" *ngIf="itemForm.get('description')?.touched && itemForm.get('description')?.invalid">Description is required.</div>
    </div>

    <div class="form-group">
      <label for="dateTime">Date/Time</label>
      <input id="dateTime" type="datetime-local" class="form-control" formControlName="dateTime" />
      <div class="text-danger" *ngIf="itemForm.get('dateTime')?.touched && itemForm.get('dateTime')?.invalid">Date/Time is required.</div>
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input id="location" type="text" class="form-control" formControlName="location" />
      <div class="text-danger" *ngIf="itemForm.get('location')?.touched && itemForm.get('location')?.invalid">Location is required.</div>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <input id="status" type="text" class="form-control" formControlName="status" />
      <div class="text-danger" *ngIf="itemForm.get('status')?.touched && itemForm.get('status')?.invalid">Status is required.</div>
    </div>

    <button type="submit" class="btn btn-primary">Create</button>
  </form>

  <div class="alert alert-success mt-3" *ngIf="showMessage">{{ responseMessage }}</div>
  <div class="alert alert-danger mt-3" *ngIf="showError">{{ errorMessage }}</div>

  <hr />

  <h3>Existing Events</h3>
  <ul class="list-group">
    <li class="list-group-item" *ngFor="let ev of eventList">
      <strong>{{ ev.title }}</strong> — {{ ev.location }} — {{ ev.status }}
      <small class="text-muted d-block">Scheduled: {{ ev.dateTime | date: 'short' }}</small>
    </li>
  </ul>
</div>
