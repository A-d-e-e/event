
<div class="container">
  <h2>Login</h2>

  <form [formGroup]="itemForm" (ngSubmit)="onLogin()">
    <div class="form-group">
      <label for="username">Username</label>
      <input id="username" type="text" class="form-control" formControlName="username" />
      <div class="text-danger" *ngIf="itemForm.get('username')?.touched && itemForm.get('username')?.invalid">
        Username is required.
      </div>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input id="password" type="password" class="form-control" formControlName="password" />
      <div class="text-danger" *ngIf="itemForm.get('password')?.touched && itemForm.get('password')?.invalid">
        Password is required.
      </div>
    </div>

    <button type="submit" class="btn btn-primary">Login</button>
    <button type="button" class="btn btn-link" (click)="registration()">Register</button>

    <div class="alert alert-danger mt-3" *ngIf="showError">{{ errorMessage }}</div>
  </form>
</div>
