
<div class="container">
  <h2>View / Edit Event</h2>

  <div class="form-inline mb-3">
    <label for="eventSearch" class="mr-2">Event ID</label>
    <input id="eventSearch" type="number" class="form-control mr-2" [(ngModel)]="formModel.eventID" placeholder="Enter Event ID">
    <button class="btn btn-primary" (click)="searchEvent()">Search</button>
  </div>

  <div class="alert alert-danger" *ngIf="showError">{{ errorMessage }}</div>

  <div *ngIf="eventObj.length > 0">
    <h4>Search Result</h4>
    <ul class="list-group">
      <li class="list-group-item" *ngFor="let ev of eventObj">
        <div><strong>{{ ev.title }}</strong> — {{ ev.location }} — {{ ev.status }}</div>
        <div class="text-muted">Scheduled: {{ ev.dateTime | date:'short' }}</div>
        <button class="btn btn-sm btn-secondary mt-2" (click)="edit(ev)">Edit</button>
      </li>
    </ul>
  </div>

  <hr />

  <form [formGroup]="itemForm" (ngSubmit)="onSubmit()" *ngIf="isUpdate">
    <h4>Edit Event</h4>

    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" type="text" class="form-control" formControlName="title" />
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" rows="3" class="form-control" formControlName="description"></textarea>
    </div>

    <div class="form-group">
      <label for="dateTime">Date/Time</label>
      <input id="dateTime" type="datetime-local" class="form-control" formControlName="dateTime" />
    </div>

    <div class="form-group">
      <label for="location">Location</label>
      <input id="location" type="text" class="form-control" formControlName="location" />
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <input id="status" type="text" class="form-control" formControlName="status" />
    </div>

    <button type="submit" class="btn btn-success">Update</button>
  </form>
</div>
